name: Verdict Attest
'on':
  push:
    branches:
    - main
    - master
    tags:
    - v*
  pull_request:
    branches:
    - main
    - master

permissions:
  contents: read

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20'
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'
    - name: Require VERDICT_CLI_DEPLOY_KEY (private dependency)
      env:
        VERDICT_CLI_DEPLOY_KEY: ${{ secrets.VERDICT_CLI_DEPLOY_KEY }}
      run: |
        if [ -z "$VERDICT_CLI_DEPLOY_KEY" ]; then
          echo "::error title=VERDICT_CLI_DEPLOY_KEY secret missing::verdict-cli is a private dependency; unauthenticated install cannot fetch it. Add the read-only deploy key secret, then re-run. The job stays red rather than faking a green attestation."
          exit 1
        fi
        echo "VERDICT_CLI_DEPLOY_KEY present — proceeding."
    - name: Checkout verdict-cli (private, read-only deploy key)
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: os1221/verdict-cli
        ref: 629d08ad55e53cc51402e224a0794f7b5215f5b0
        ssh-key: ${{ secrets.VERDICT_CLI_DEPLOY_KEY }}
        path: verdict-cli
        persist-credentials: false
    - name: Install verdict-cli[verdict-v1]
      # Install from the checkout, then remove the directory so the extra
      # untracked tree cannot dirty the attestation's matches_checkout facts.
      run: |
        pip install "./verdict-cli[verdict-v1]"
        rm -rf verdict-cli
    - name: Gather build facts
      id: facts
      run: 'python3 -c "

        from verdict import attest

        import json

        facts = attest.gather_build_facts(''.'')

        print(''facts<<EOF'')

        print(json.dumps(facts))

        print(''EOF'')

        " >> $GITHUB_OUTPUT'
    - name: Sign build attestation
      id: sign
      env:
        VERDICT_BUILDER: github-actions
        VERDICT_KEY_PATH: ${{secrets.VERDICT_SIGNING_KEY}}
      run: 'python3 -c "

        from verdict import attest

        import json, os

        key_path = os.getenv(''VERDICT_KEY_PATH'') or None

        envelope = attest.sign_build(''.'', builder=''github-actions'', key_path=key_path)

        print(''envelope<<EOF'')

        print(json.dumps(envelope))

        print(''EOF'')

        " >> $GITHUB_OUTPUT'
    - name: Verify attestation matches checkout
      # Envelope travels via env, never inlined into shell — bash consumes the
      # JSON's own quotes otherwise (the exact json.decoder failure verdict-cli
      # fixed in 2dc129d). Same defect class, same env+heredoc cure.
      env:
        VERDICT_ENVELOPE: ${{ steps.sign.outputs.envelope }}
      run: |
        python3 <<'PYEOF'
        from verdict import attest
        import json, os, sys
        envelope = json.loads(os.environ["VERDICT_ENVELOPE"])
        result = attest.verify_build(envelope, '.')
        print('Verification:', json.dumps(result))
        if not result.get('signature_valid'):
            print('ERROR: Signature verification failed')
            sys.exit(1)
        if not result.get('matches_checkout'):
            print('ERROR: Attestation does not match checkout')
            sys.exit(1)
        print('Attestation valid and matches checkout')
        PYEOF
    - name: Create attestation file
      env:
        VERDICT_ENVELOPE: ${{ steps.sign.outputs.envelope }}
      run: printf '%s\n' "$VERDICT_ENVELOPE" > verdict-build-attestation.json
    - name: Upload attestation artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: verdict-build-attestation
        path: verdict-build-attestation.json
        retention-days: 90
    - name: Fail on dirty working tree (for tagged releases)
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        VERDICT_ENVELOPE: ${{ steps.sign.outputs.envelope }}
      run: |
        python3 <<'PYEOF'
        import json
        import os
        import sys

        envelope = json.loads(os.environ["VERDICT_ENVELOPE"])
        if envelope["receipt"].get("dirty"):
            print("ERROR: Tagged release built from dirty working tree")
            sys.exit(1)
        print("Clean working tree for release")
        PYEOF
