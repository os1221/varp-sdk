name: Publish package

'on':
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    if: github.repository == 'os1221/varp-sdk' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false
      - name: Pin an OIDC-capable npm CLI
        run: npm install --global npm@11.16.0
      - name: Verify npm supports trusted publishing
        run: npm run release:verify-npm
      - name: Verify package identity and exact release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: npm run release:verify
      - name: Verify checkout is the release tag commit
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          test "$head_commit" = "$tag_commit"
      - name: Install exact dependencies
        run: npm ci
      - name: Build and test
        run: npm test
      - name: Verify the publishable package boundary
        run: npm run verify:package
      - name: Build the exact package artifact
        run: |
          mkdir release-artifact
          npm pack --pack-destination release-artifact
          package_count="$(find release-artifact -maxdepth 1 -name '*.tgz' | wc -l | tr -d ' ')"
          test "$package_count" = '1'
          (cd release-artifact && shasum -a 256 ./*.tgz > SHA256SUMS)
      - name: Upload the verified package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-${{ github.event.release.tag_name }}
          path: release-artifact/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: verify
    if: github.repository == 'os1221/varp-sdk' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
      url: https://www.npmjs.com/package/@os1221/varp
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false
      - name: Verify npm supports trusted publishing
        run: node scripts/verify-npm-version.cjs
      - name: Re-verify package identity and exact release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: npm run release:verify
      - name: Re-verify checkout is the release tag commit
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          test "$head_commit" = "$tag_commit"
      - name: Download the verified package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ github.event.release.tag_name }}
          path: release-artifact
      - name: Verify package artifact integrity
        run: |
          (cd release-artifact && shasum -a 256 -c SHA256SUMS)
          package_count="$(find release-artifact -maxdepth 1 -name '*.tgz' | wc -l | tr -d ' ')"
          test "$package_count" = '1'
      - name: Publish publicly with npm trusted publishing
        run: npm publish release-artifact/*.tgz --access public
